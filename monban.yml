# mulyu / okite — monban security baseline (extends 用)。詳細は README.ja.md。

exclude:
  - "**/node_modules/**"

content:
  forbidden:
    - path: "**/*"
      conflict: true
      severity: error
    - path: "**/*"
      secret: true
      severity: warn
    - path: "**/*"
      invisible: true
      severity: warn
    - path: "**/*.md"
      injection: true
      severity: warn

github:
  actions:
    pinned:
      - path: ".github/workflows/**/*.yml"
    permissions:
      - path: ".github/workflows/**/*.yml"
        required: true
        forbidden: ["write-all", "read-all"]
    timeout:
      - path: ".github/workflows/**/*.yml"
        max: 20
    concurrency:
      - path: ".github/workflows/**/*.yml"
    triggers:
      - path: ".github/workflows/**/*.yml"
        forbidden: ["pull_request_target"]
    runner:
      - path: ".github/workflows/**/*.yml"
        allowed: ["ubuntu-latest"]
    secrets:
      - path: ".github/workflows/**/*.yml"
        allowed: ["GITHUB_TOKEN"]
    consistency:
      - path: ".github/workflows/**/*.yml"
        actions: ["actions/checkout", "actions/setup-node"]
    forbidden:
      - path: ".github/workflows/**/*.yml"
        uses: "actions/create-release"
    danger:
      - path: ".github/workflows/**/*.yml"
    injection:
      - path: ".github/workflows/**/*.yml"

deps:
  existence:
    - path: "package.json"
    - path: ".github/workflows/**/*.yml"
  typosquat:
    - path: "package.json"
      max_distance: 1
      severity: error
  freshness:
    - path: "package.json"
      max_age_hours: 72
      severity: error
  popularity:
    - path: "package.json"
      min_downloads: 1000
      severity: error
  cross_ecosystem:
    - path: "package.json"
      severity: error
  forbidden:
    - path: "package.json"
      names:
        - event-stream
        - flatmap-stream
      message: "過去に compromise されたパッケージです。"
  install_scripts:
    - path: "package.json"
      severity: error
      message: "npm lifecycle hook はサプライチェーン攻撃の主要ベクトル。正当性を PR でレビュー。"
  git_dependency:
    - path: "package.json"
      severity: error
  floating_version:
    - path: "package.json"
      severity: error

agent:
  mcp:
    - path: "{.mcp.json,.claude/settings.json,.cursor/mcp.json}"
      unpinned_npx: true
      env_secrets: true
      severity: error
  settings:
    - path: "{.claude/settings.json,.claude/settings.local.json}"
      unpinned_npx: true
      severity: error
  ignore:
    - path: "{.llmignore,.aiexclude,.claudeignore,.cursorignore}"
      severity: warn

git:
  diff:
    ignored:
      scope: diff
      severity: error

docker:
  pinned:
    - path: "**/Dockerfile"
      severity: error
  user:
    - path: "**/Dockerfile"
      severity: error
  healthcheck:
    - path: "**/Dockerfile"
      severity: warn
  forbidden:
    - path: "**/Dockerfile"
      instructions:
        - name: "ADD"
          pattern: "^https?://"
          message: "ADD <URL> ではなく COPY + curl/wget で来歴を明示してください。"
        - name: "MAINTAINER"
          message: "MAINTAINER は廃止命令です。LABEL maintainer を使ってください。"
      severity: error

license:
  file:
    - path: "LICENSE"
      allowed: ["MIT"]
      severity: error
      message: "mulyu 配下は MIT 統一。LICENSE ファイルが欠落しているか、別ライセンスに差し替えられています。"
